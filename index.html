<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#16a34a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="物料盘点">
  <title>物料盘点</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="title" id="topTitle">物料盘点</div>
    <div style="display:flex; gap:8px;">
      <button id="dataBtn" class="icon-btn" title="数据备份与恢复">💾</button>
      <button id="themeBtn" class="icon-btn" title="切换主题">🌗</button>
    </div>
  </header>

  <main id="view">
    <div class="loading">正在加载本地数据库…</div>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-view="materials">📦<span>物料档案</span></button>
    <button class="tab" data-view="sheets">📋<span>盘点单</span></button>
    <button class="tab" data-view="trash">🗑<span>回收站</span></button>
  </nav>

  <div id="modal" class="modal-mask hidden"></div>
  <input type="file" id="fileInput" accept=".xlsx,.xls" class="hidden">
  <input type="file" id="backupInput" accept=".json,application/json" class="hidden">

  <script src="vendor/sql-wasm.js"></script>
  <script src="js/db-core.js"></script>
  <script src="js/db.js"></script>
  <script src="js/import.js"></script>
  <script src="js/export.js"></script>
  <script src="js/kingdee-sheets.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
